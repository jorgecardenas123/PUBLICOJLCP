<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Combustion Chamber Temperature Spread — Animated</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f1e; color: #e0e0e0; font-family: Arial, sans-serif; padding: 16px; }
  h2 { text-align: center; color: #f0c040; font-size: 15px; margin-bottom: 3px; }
  .subtitle { text-align: center; color: #888; font-size: 11px; margin-bottom: 14px; }

  .stats { display: flex; justify-content: center; gap: 28px; margin-bottom: 14px; flex-wrap: wrap; }
  .stat { text-align: center; background: #1a1a30; border-radius: 8px; padding: 8px 16px; min-width: 80px; }
  .stat-val { font-size: 20px; font-weight: bold; color: #f0c040; }
  .stat-lbl { font-size: 10px; color: #888; margin-top: 2px; }

  .chart-wrap { display: flex; justify-content: center; }
  canvas { display: block; }

  .controls { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 14px; }
  .btn-row { display: flex; gap: 10px; }
  button {
    background: #2a2a4a; border: 1px solid #444; color: #e0e0e0;
    padding: 7px 18px; border-radius: 6px; cursor: pointer; font-size: 13px;
    transition: background 0.2s;
  }
  button:hover { background: #3a3a6a; }
  button.active { background: #f0c040; color: #111; border-color: #f0c040; font-weight: bold; }

  .slider-row { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 560px; }
  input[type=range] { flex: 1; accent-color: #f0c040; }
  .ts-label { font-size: 12px; color: #f0c040; min-width: 130px; text-align: right; }

  .speed-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #888; }
  select { background: #1a1a30; color: #e0e0e0; border: 1px solid #444; border-radius: 4px; padding: 3px 6px; }

  .legend { display: flex; justify-content: center; gap: 20px; margin-top: 10px; font-size: 11px; flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 5px; }
  .leg-box { width: 13px; height: 13px; border-radius: 3px; }

  .progress-bar { width: 100%; max-width: 560px; height: 4px; background: #2a2a4a; border-radius: 2px; }
  .progress-fill { height: 100%; background: #f0c040; border-radius: 2px; transition: width 0.1s; }
</style>
</head>
<body>

<h2>Combustion Chamber Temperature Monitor — 11MBA10</h2>
<div class="subtitle">Temperature Spread · 16 Thermocouples · Diciembre 2025</div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="s-avg">—</div><div class="stat-lbl">Promedio (°C)</div></div>
  <div class="stat"><div class="stat-val" id="s-spread">—</div><div class="stat-lbl">Spread (°C)</div></div>
  <div class="stat"><div class="stat-val" id="s-min">—</div><div class="stat-lbl">Mín (°C)</div></div>
  <div class="stat"><div class="stat-val" id="s-max">—</div><div class="stat-lbl">Máx (°C)</div></div>
</div>

<div class="chart-wrap">
  <canvas id="chart" width="520" height="520"></canvas>
</div>

<div class="legend">
  <div class="leg-item"><div class="leg-box" style="background:rgba(255,140,0,0.65)"></div>Temperatura actual</div>
  <div class="leg-item"><div class="leg-box" style="background:transparent;border:2px dashed #f0c040"></div>Promedio</div>
  <div class="leg-item"><div class="leg-box" style="background:rgba(100,180,255,0.25);border:1px solid #64b4ff"></div>Rango mín–máx histórico</div>
</div>

<div class="controls">
  <div class="slider-row">
    <input type="range" id="slider" min="0" max="0" value="0">
    <div class="ts-label" id="ts-label">—</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
  <div class="btn-row">
    <button id="btn-prev">◀ Anterior</button>
    <button id="btn-play" class="active">▶ Play</button>
    <button id="btn-next">Siguiente ▶</button>
  </div>
  <div class="speed-row">
    Velocidad:
    <select id="speed">
      <option value="2000">Lenta (2s)</option>
      <option value="1000" selected>Normal (1s)</option>
      <option value="500">Rápida (0.5s)</option>
      <option value="200">Muy rápida (0.2s)</option>
    </select>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const rawData = [
  { ts: "19/12 10:29", temps: [612.75,604.3,600.6,605.9,606.1,604.6,596.283,604.73,600.7,607,604.5,607.767,597.9,609.95,602.1,605.3] },
  { ts: "19/12 11:00", temps: [613.5,604.8,601.8,606.75,606.833,605.9,596.7,605.217,601.222,608.629,605.35,609.057,598.7,611.7,603.483,606.067] },
  { ts: "19/12 11:34", temps: [613,605.1,601.3,607.167,606.8,605.4,597.15,604.7,601,607.1,604.9,608.4,598.24,610.8,602.425,605.9] },
  { ts: "19/12 12:01", temps: [612.85,604.8,601.5,606.7,606.8,605.814,597.3,605,600.5,608,604.9,608.1,597.95,611,603.186,606.033] },
  { ts: "19/12 12:44", temps: [614.9,606.3,602.15,608.067,607.767,606.8,598.433,606.9,601.6,609.333,606.7,608.8,599.35,612.8,603.82,606.9] },
  { ts: "19/12 12:45", temps: [613.9,606.75,602.6,608.4,608.1,607.167,598.567,606.814,602,609.467,605.5,609.467,599.675,611.5,603.96,607.4] },
  { ts: "19/12 12:46", temps: [614.4,607.2,602.5,608.233,607.983,607.533,598.7,606.729,602.45,609.6,606.4,610.133,600,613.4,604.1,607.9] },
  { ts: "19/12 12:47", temps: [615.5,607,602.4,608.067,607.867,607.9,598.475,606.643,602.9,609.45,607.8,610.8,599.767,613.133,604.5,607.8] },
  { ts: "19/12 12:48", temps: [614.3,606.8,602.3,607.9,607.75,607.4,598.25,606.557,602.467,609.3,606.9,610.05,599.533,612.867,604.2,607.7] },
  { ts: "19/12 12:49", temps: [614.26,606.6,602.417,608.1,607.633,606.9,598.025,606.471,602.033,609.175,606.65,609.3,599.3,612.6,603.9,607.533] },
  { ts: "19/12 12:50", temps: [614.22,606.4,602.533,608.35,607.517,607,597.8,606.386,601.6,609.05,606.4,609.55,599.2,612.5,603.6,607.367] },
  { ts: "19/12 12:51", temps: [614.18,606.25,602.65,608.6,607.4,607.1,598.067,606.3,602,608.925,605.9,609.8,599.1,612.4,603.85,607.2] },
  { ts: "19/12 12:52", temps: [614.14,606.1,602.767,608.85,607.55,607.2,598.333,606.7,602.1,608.8,605.4,609.86,599,612.3,604.1,607.6] },
  { ts: "19/12 12:53", temps: [614.1,607.1,602.883,609.1,607.7,607.3,598.6,607.1,602.2,609.8,606.4,609.92,599.45,612.8,604.35,608] },
  { ts: "19/12 12:54", temps: [615,606.75,603,608.65,608,607.4,598.15,606.933,602.3,609.65,606.35,609.98,599.9,613.3,604.6,607.75] },
  { ts: "19/12 12:55", temps: [614.3,606.4,602.9,608.2,607.633,607.5,597.7,606.767,602.4,609.5,606.3,610.04,599.1,612.9,603.7,607.5] },
  { ts: "19/12 12:56", temps: [614.05,606.2,602.8,608.25,607.267,607.6,598.6,606.6,602.5,609.225,606.25,610.1,599.175,612.533,603.777,607.25] },
  { ts: "19/12 12:57", temps: [613.8,606,602.3,608.3,606.9,606.1,598.2,606.267,602.1,608.95,606.2,609.65,599.25,612.167,603.854,607] },
  { ts: "19/12 12:58", temps: [613.55,605.8,601.9,607.8,607.5,606.4,597.9,605.933,601.7,608.675,606.15,609.2,599.325,611.8,603.931,607.325] },
  { ts: "19/12 13:49", temps: [614.6,607,602.7,608.5,608.7,606.9,598.5,606.75,602.9,609.66,606.5,609.7,599.467,613.2,604,608.1] },
  { ts: "19/12 14:12", temps: [613.367,604.867,600.8,606.15,606.4,605.167,597,605.3,600.271,607.15,605.15,607.9,597.513,610.5,603.3,605.55] },
  { ts: "19/12 14:38", temps: [612.58,603.6,600,605.98,605.65,603.8,596.433,603.65,600.1,607.4,603.95,607.425,597,609.6,601.5,604.8] },
  { ts: "19/12 15:38", temps: [611.98,603.4,600.029,605,605.16,603.767,595.4,603.2,599.5,606.05,603.4,606.55,596.775,609.1,601.1,603.8] },
  { ts: "19/12 16:24", temps: [611.92,603.24,599.48,604.7,605.3,602.85,595.44,603.1,599.3,605.6,603.4,606.2,596.44,608.7,601.167,603.545] },
  { ts: "19/12 16:45", temps: [610.85,null,599.067,604.35,604.163,602.3,594.55,602.186,598.387,605.314,602.72,605.7,596.2,608.25,600.5,602.8] },
  { ts: "19/12 17:41", temps: [610.25,601.1,597.238,602.1,603.233,600.867,592.7,601.14,597.5,604.02,601.65,604.185,594.7,606.593,599.1,601.54] },
  // Feb data
  { ts: "03/02 08:24", temps: [612.9,603.2,602.1,603.3,600.7,601.1,596.2,604.2,598.5,606.7,601.4,605.6,594.7,607.35,600.8,603.15] },
];

// Labels for 16 TCs (every 22.5°)
const tcLabels = Array.from({length:16}, (_,i) => `CT${String(i+1).padStart(2,'0')}\n${(i*22.5).toFixed(1)}°`);

// Compute global min/max per TC for historical range
const globalMin = Array(16).fill(Infinity);
const globalMax = Array(16).fill(-Infinity);
rawData.forEach(row => {
  row.temps.forEach((v,i) => {
    if (v !== null) {
      if (v < globalMin[i]) globalMin[i] = v;
      if (v > globalMax[i]) globalMax[i] = v;
    }
  });
});

// Close polygon helper
const close = arr => [...arr, arr[0]];
const labelsLoop = close(tcLabels);
const globalMinLoop = close(globalMin);
const globalMaxLoop = close(globalMax);

// ── CHART SETUP ───────────────────────────────────────────────────────────────
const ctx = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'radar',
  data: {
    labels: labelsLoop,
    datasets: [
      {
        label: 'Rango máx histórico',
        data: globalMaxLoop,
        backgroundColor: 'rgba(100,180,255,0.12)',
        borderColor: 'rgba(100,180,255,0.5)',
        borderWidth: 1, borderDash: [3,3],
        pointRadius: 0, fill: '+1'
      },
      {
        label: 'Rango mín histórico',
        data: globalMinLoop,
        backgroundColor: 'rgba(100,180,255,0.12)',
        borderColor: 'rgba(100,180,255,0.5)',
        borderWidth: 1, borderDash: [3,3],
        pointRadius: 0, fill: false
      },
      {
        label: 'Promedio',
        data: Array(17).fill(0),
        backgroundColor: 'rgba(0,0,0,0)',
        borderColor: '#f0c040',
        borderWidth: 2, borderDash: [6,4],
        pointRadius: 0,
      },
      {
        label: 'Temperatura (°C)',
        data: Array(17).fill(0),
        backgroundColor: 'rgba(255,140,0,0.50)',
        borderColor: 'rgba(255,140,0,1)',
        borderWidth: 2,
        pointBackgroundColor: 'rgba(255,140,0,1)',
        pointRadius: 5, pointHoverRadius: 7,
      },
    ]
  },
  options: {
    responsive: false,
    animation: { duration: 400, easing: 'easeInOutQuad' },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: c => `${c.dataset.label}: ${Number(c.raw).toFixed(2)} °C`
        }
      }
    },
    scales: {
      r: {
        min: 580, max: 620,
        ticks: { stepSize: 5, color: '#888', font:{size:10}, backdropColor:'transparent' },
        grid: { color: 'rgba(255,255,255,0.12)' },
        angleLines: { color: 'rgba(255,255,255,0.18)' },
        pointLabels: { color: '#bbb', font:{size:10} }
      }
    }
  }
});

// ── UPDATE FUNCTION ───────────────────────────────────────────────────────────
function updateFrame(idx) {
  const row = rawData[idx];
  // Fill nulls with avg of neighbours
  const filled = row.temps.map((v,i,arr) => {
    if (v !== null) return v;
    const prev = arr[(i-1+16)%16];
    const next = arr[(i+1)%16];
    const vals = [prev,next].filter(x=>x!==null);
    return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 600;
  });

  const valid = filled.filter(v=>v!==null);
  const avg = valid.reduce((a,b)=>a+b,0)/valid.length;
  const minV = Math.min(...valid);
  const maxV = Math.max(...valid);
  const spread = maxV - minV;

  document.getElementById('s-avg').textContent = avg.toFixed(1);
  document.getElementById('s-spread').textContent = spread.toFixed(1);
  document.getElementById('s-min').textContent = minV.toFixed(1);
  document.getElementById('s-max').textContent = maxV.toFixed(1);
  document.getElementById('ts-label').textContent = row.ts;
  document.getElementById('slider').value = idx;
  document.getElementById('prog').style.width = `${(idx/(rawData.length-1))*100}%`;

  chart.data.datasets[2].data = close(Array(16).fill(avg));
  chart.data.datasets[3].data = close(filled);
  chart.update();
}

// ── CONTROLS ──────────────────────────────────────────────────────────────────
const slider = document.getElementById('slider');
slider.max = rawData.length - 1;
slider.addEventListener('input', () => { stopAnim(); updateFrame(+slider.value); });

let currentIdx = 0;
let animTimer = null;

function stopAnim() {
  clearInterval(animTimer);
  animTimer = null;
  document.getElementById('btn-play').textContent = '▶ Play';
  document.getElementById('btn-play').classList.remove('active');
}

function startAnim() {
  const speed = +document.getElementById('speed').value;
  animTimer = setInterval(() => {
    currentIdx = (currentIdx + 1) % rawData.length;
    updateFrame(currentIdx);
  }, speed);
  document.getElementById('btn-play').textContent = '⏸ Pausa';
  document.getElementById('btn-play').classList.add('active');
}

document.getElementById('btn-play').addEventListener('click', () => {
  if (animTimer) { stopAnim(); }
  else { startAnim(); }
});

document.getElementById('btn-prev').addEventListener('click', () => {
  stopAnim();
  currentIdx = (currentIdx - 1 + rawData.length) % rawData.length;
  updateFrame(currentIdx);
});

document.getElementById('btn-next').addEventListener('click', () => {
  stopAnim();
  currentIdx = (currentIdx + 1) % rawData.length;
  updateFrame(currentIdx);
});

document.getElementById('speed').addEventListener('change', () => {
  if (animTimer) { stopAnim(); startAnim(); }
});

// Init
updateFrame(0);
startAnim();
</script>
</body>
</html>
